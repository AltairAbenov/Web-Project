<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">💳</span>
      <h1>Registrate</h1>
      <p>Create new account</p>
    </div>

    @if (error()) {
      <div class="error-msg">{{ error() }}</div>
    }

    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" [(ngModel)]="firstName" placeholder="Name" />
      </div>
      <div class="form-group">
        <label>Surname</label>
        <input type="text" [(ngModel)]="lastName" placeholder="Surname" />
      </div>
    </div>

    <div class="form-group">
      <label>Login *</label>
      <input type="text" [(ngModel)]="username" placeholder="Make a login" />
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" [(ngModel)]="email" placeholder="your@email.com" />
    </div>

    <div class="form-group">
      <label>Password *</label>
      <input type="password" [(ngModel)]="password" placeholder="Minimum 4 symbols" />
    </div>

    <div class="form-group">
      <label>Confirm password *</label>
      <input type="password" [(ngModel)]="passwordConfirm" placeholder="Repeat password" (keyup.enter)="submit()" />
    </div>

    <button class="btn btn-primary btn-full" (click)="submit()">Create account</button>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>
  </div>
</div>
